<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="829px" preserveAspectRatio="none" style="width:1578px;height:829px;background:#FFFFFF;" version="1.1" viewBox="0 0 1578 829" width="1578px" zoomAndPan="magnify"><title>verifier_ctx_t &#8212; State Machine</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="216.5762" x="674.1004" y="23.5352">verifier_ctx_t &#8212; State Machine</text></g><g class="entity" data-qualified-name="EXPECT_INIT" id="ent0002"><rect fill="#FDFDFD" height="78.8867" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="225.5645" x="1189.72" y="140.4883"/><line style="stroke:#555555;stroke-width:0.5;" x1="1189.72" x2="1415.2845" y1="166.9766" y2="166.9766"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84.4785" x="1260.263" y="159.0234">EXPECT_INIT</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="142.0137" x="1194.72" y="183.5781">Waiting for the first line.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="175.793" x="1194.72" y="197.7109">Must carry an INIT SD element</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="205.5645" x="1194.72" y="211.8438">whose pubkey fingerprint matches.</text></g><g class="entity" data-qualified-name="PROCESSING" id="ent0003"><rect fill="#FDFDFD" height="78.8867" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="183.0078" x="7" y="337.8583"/><line style="stroke:#555555;stroke-width:0.5;" x1="7" x2="190.0078" y1="364.3466" y2="364.3466"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84.3145" x="56.3467" y="356.3934">PROCESSING</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="74.1035" x="12" y="380.9481">Chain is live.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="163.0078" x="12" y="395.0809">Each line updates the chain;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="153.7148" x="12" y="409.2138">SIG lines verify signatures.</text></g><g class="entity" data-qualified-name="ERROR" id="ent0004"><rect fill="#FDFDFD" height="78.8867" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="213.8223" x="992.59" y="520.2383"/><line style="stroke:#555555;stroke-width:0.5;" x1="992.59" x2="1206.4123" y1="546.7266" y2="546.7266"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="45.0215" x="1076.9904" y="538.7734">ERROR</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="143.3027" x="997.59" y="563.3281">Unrecoverable: bad INIT,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151.4824" x="997.59" y="577.4609">fingerprint mismatch, etc.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.8223" x="997.59" y="591.5938">Further process_line() returns -1.</text></g><g class="entity" data-qualified-name="DONE" id="ent0005"><rect fill="#FDFDFD" height="64.7539" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="160.666" x="1019.17" y="676.1283"/><line style="stroke:#555555;stroke-width:0.5;" x1="1019.17" x2="1179.836" y1="702.6166" y2="702.6166"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="39.293" x="1079.8565" y="694.6634">DONE</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="138.5566" x="1024.17" y="719.2181">verifier_finalize() called.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="140.666" x="1024.17" y="733.3509">No more lines accepted.</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="9" id="ent0002"><ellipse cx="1302.5" cy="53.4883" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="end_entity" data-qualified-name=".end." data-source-line="41" id="ent0014"><ellipse cx="1099.5" cy="812.8783" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="1099.5" cy="812.8783" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="33" id="ent0003"><path d="M942.59,326.3783 L942.59,373.3083 L190.26,377.3083 L942.59,381.3083 L942.59,428.2416 A0,0 0 0 0 942.59,428.2416 L1232.4132,428.2416 A0,0 0 0 0 1232.4132,428.2416 L1232.4132,336.3783 L1222.4132,326.3783 L942.59,326.3783 A0,0 0 0 0 942.59,326.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1222.4132,326.3783 L1222.4132,336.3783 L1232.4132,336.3783 L1222.4132,326.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.4658" x="948.59" y="343.9466">Recoverable errors (chain hash mismatch,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236.0122" x="948.59" y="359.2572">invalid signature, sequence skew) are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.252" x="948.59" y="374.5677">recorded via add_error() but do NOT</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.2676" x="948.59" y="389.8783">drop the state out of PROCESSING.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.5234" x="948.59" y="405.1888">Only structural problems (bad INIT,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.8232" x="948.59" y="420.4994">fingerprint mismatch) transition to ERROR.</text></g><!--link *start* to EXPECT_INIT--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="9" id="lnk3"><path d="M1302.5,63.8383 C1302.5,79.8383 1302.5,107.3083 1302.5,134.0583" fill="none" id="*start*-to-EXPECT_INIT" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1302.5,140.0583,1306.5,131.0583,1302.5,135.0583,1298.5,131.0583,1302.5,140.0583" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.5488" x="1303.5" y="107.0566">verifier_init()</text></g><!--link EXPECT_INIT to PROCESSING--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="16" id="lnk4"><path d="M1189.23,199.3083 C952.15,237.7783 413.5925,325.1772 196.3625,360.4272" fill="none" id="EXPECT_INIT-to-PROCESSING" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="190.44,361.3883,199.9645,363.8951,195.3754,360.5874,198.6831,355.9983,190.44,361.3883" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.8853" x="892.3604" y="262.9466">valid INIT SD</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="98.5029" x="883.0516" y="278.2572">(fingerprint OK,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="105.2061" x="879.7" y="293.5677">chain_hash = IV)</text></g><!--link EXPECT_INIT to ERROR--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="18" id="lnk5"><path d="M1301.67,219.6583 C1298.98,270.7883 1288.55,362.0583 1249.5,428.2383 C1227.76,465.0983 1196.7138,493.2938 1165.5038,516.2438" fill="none" id="EXPECT_INIT-to-ERROR" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1160.67,519.7983,1170.2904,517.6891,1164.6982,516.8362,1165.551,511.244,1160.67,519.7983" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.9932" x="1293.97" y="367.3766">line is not an INIT SD</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.3159" x="1298.3086" y="382.6872">/ missing siglog SD</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.9331" x="1288" y="397.9977">/ fingerprint mismatch</text></g><!--link PROCESSING to PROCESSING--><g class="link" data-entity-1="ent0003" data-entity-2="ent0003" data-link-type="dependency" data-source-line="20" id="lnk6"><path d="M190.33,372.8883 C210.41,373.3183 225.01,374.7883 225.01,377.3083 C225.01,379.8283 216.4087,381.1728 196.3287,381.5928" fill="none" id="PROCESSING-to-PROCESSING" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="190.33,381.7183,199.4117,385.5292,195.3289,381.6137,199.2444,377.531,190.33,381.7183" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.4453" x="268.823" y="374.8766">MSG SD</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.0713" x="231.01" y="390.1872">(hash chain update)</text></g><!--link PROCESSING to PROCESSING--><g class="link" data-entity-1="ent0003" data-entity-2="ent0003" data-link-type="dependency" data-source-line="21" id="lnk7"><path d="M190.37,369.2283 C268.18,366.5283 361.01,369.2283 361.01,377.3083 C361.01,385.3883 274.1764,388.2864 196.3664,385.5864" fill="none" id="PROCESSING-to-PROCESSING-1" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="190.37,385.3783,199.2259,389.688,195.367,385.5517,199.5033,381.6928,190.37,385.3783" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="40.9932" x="423.9167" y="367.3766">SIG SD</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="154.8066" x="367.01" y="382.6872">(hash + verify signature;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.1631" x="368.8318" y="397.9977">add_error on mismatch)</text></g><!--link PROCESSING to PROCESSING--><g class="link" data-entity-1="ent0003" data-entity-2="ent0003" data-link-type="dependency" data-source-line="22" id="lnk8"><path d="M190.32,367.2283 C319.88,360.2183 527.01,363.5783 527.01,377.3083 C527.01,391.0383 325.8712,394.7124 196.3112,387.7024" fill="none" id="PROCESSING-to-PROCESSING-2" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="190.32,387.3783,199.0907,391.8587,195.3127,387.6484,199.523,383.8704,190.32,387.3783" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.1724" x="552.199" y="374.8766">CONTINUE SD</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="125.5503" x="533.01" y="390.1872">(segment_count++)</text></g><!--link PROCESSING to PROCESSING--><g class="link" data-entity-1="ent0003" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk9"><path d="M190.4,365.4383 C355.81,354.0983 664.01,358.0583 664.01,377.3083 C664.01,396.5583 361.7959,400.9287 196.3859,389.5887" fill="none" id="PROCESSING-to-PROCESSING-3" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="190.4,389.1783,199.1053,393.7845,195.3883,389.5